<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mozlottoganha - Sistema Avançado</title>
    <style>
        :root { --primary: #008751; --secondary: #f7a600; --dark: #1a1a1a; --light: #f4f4f4; }
        body { font-family: sans-serif; background: var(--light); padding: 20px; color: var(--dark); }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 6px; background: #fff; margin-bottom: 15px;}
        .balls-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
        .ball { background: #eee; padding: 8px 0; text-align: center; font-size: 11px; font-weight: bold; cursor: pointer; border-radius: 50%; }
        .ball.selected { background: var(--secondary); color: black; }
        button { width: 100%; padding: 12px; margin: 8px 0; background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .btn-blue { background: #0066cc; }
        .btn-orange { background: var(--secondary); color: black; }
        .status-box { background: #eef; padding: 10px; border-radius: 4px; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🇲🇿 Mozlottoganha Pro</h1>
    
    <div class="grid">
        <div>
            <div class="card">
                <h3>1. Nova Aposta</h3>
                <label>Sorteio:</label>
                <select id="draw-select"></select>
                
                <label>Modalidade:</label>
                <select id="chance-select" onchange="resetSelection()">
                    <option value="5">Chance 5</option>
                    <option value="4">Chance 4</option>
                    <option value="3">Chance 3</option>
                    <option value="2">Chance 2</option>
                </select>
                
                <label>Valor (MTN):</label>
                <input type="number" id="bet-amount" value="50" style="width:100%; padding:8px; margin:5px 0;">

                <div class="balls-grid" id="balls-container"></div>
                <button class="btn-orange" onclick="addAposta()">+ Adicionar ao Bilhete</button>
            </div>

            <div class="card">
                <h3>2. Linhas no Bilhete</h3>
                <div id="lista-carrinho" style="font-size:12px;">Nenhuma aposta adicionada.</div>
                <h4>Total: <span id="total-bilhete">0</span> MTN</h4>
                <button onclick="finalizarEImprimir()">EMITIR BILHETE (IMPRIMIR)</button>
            </div>
        </div>

        <div>
            <div class="card">
                <h3>Hardware / Impressora</h3>
                <button class="btn-blue" onclick="conectarImpressora()">🔌 Conectar Bluetooth POS</button>
                <div class="status-box" id="bt-status">Status: Desconectado</div>
            </div>

            <div class="card">
                <h3>⚙️ Simulação: Executar Sorteio (Controle 40%)</h3>
                <label>Escolha o Sorteio para Rodar:</label>
                <select id="draw-sorteio-select"></select>
                <button style="background:#cc3300;" onclick="executarSorteioInteligente()">🎰 Rodar Sorteio Seguro</button>
                <div class="status-box" id="resultado-sorteio" style="font-weight:bold; background:#fff3cd;">
                    Nenhum sorteio executado ainda.
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const Sorteios = [
        { id: 1, nome: "Manhã Quente", hora: "08:00" },
        { id: 2, nome: "Da Sorte", hora: "10:00" },
        { id: 3, nome: "Meio Dia", hora: "12:00" },
        { id: 4, nome: "Do Lanche", hora: "14:00" },
        { id: 5, nome: "Pôr do Sol", hora: "16:00" },
        { id: 6, nome: "O Último Comboio", hora: "18:00" },
        { id: 7, nome: "Boa Noite", hora: "20:00" },
        { id: 8, nome: "Da Despedida", hora: "22:00" }
    ];

    let selecionados = [];
    let carrinho = [];
    let dispositivoBt = null;
    let caracteristicaEscrita = null; // O canal que realmente envia texto à impressora

    window.onload = function() {
        const sel1 = document.getElementById('draw-select');
        const sel2 = document.getElementById('draw-sorteio-select');
        Sorteios.forEach(s => {
            let op = `<option value="${s.id}">${s.nome} (${s.hora})</option>`;
            sel1.innerHTML += op;
            sel2.innerHTML += op;
        });
        
        const container = document.getElementById('balls-container');
        for(let i=1; i<=90; i++) {
            container.innerHTML += `<div class="ball" id="b-${i}" onclick="votar(${i})">${i}</div>`;
        }
    };

    function votar(n) {
        let max = parseInt(document.getElementById('chance-select').value);
        let el = document.getElementById(`b-${n}`);
        if(selecionados.includes(n)) {
            selecionados = selecionados.filter(x => x !== n);
            el.classList.remove('selected');
        } else if(selecionados.length < max) {
            selecionados.push(n);
            el.classList.add('selected');
        }
    }

    function resetSelection() {
        selecionados = [];
        document.querySelectorAll('.ball').forEach(b => b.classList.remove('selected'));
    }

    function addAposta() {
        let drawId = document.getElementById('draw-select').value;
        let sorteio = Sorteios.find(x => x.id == drawId);
        let chance = document.getElementById('chance-select').value;
        let valor = parseFloat(document.getElementById('bet-amount').value);

        if(selecionados.length != chance) { return alert("Selecione a quantidade certa de bolas."); }

        carrinho.push({ sorteioId: sorteio.id, nome: sorteio.nome, chance: chance, numeros: [...selecionados], valor: valor });
        
        let lista = document.getElementById('lista-carrinho');
        lista.innerHTML = carrinho.map((c, i) => `<div>[Sorteio: ${c.nome}] Chance ${c.chance}: <b>${c.numeros.join(', ')}</b> - ${c.valor}MTN</div>`).join('');
        document.getElementById('total-bilhete').innerText = carrinho.reduce((a,b) => a + b.valor, 0);
        resetSelection();
    }

    // ==========================================
    // CORREÇÃO DO BLUETOOTH: ACESSANDO O CANAL DE ESCRITA (CHARACTERISTIC)
    // ==========================================
    async function conectarImpressora() {
        const statusBox = document.getElementById('bt-status');
        try {
            statusBox.innerText = "A procurar dispositivos...";
            dispositivoBt = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['0000ff00-0000-1000-8000-00805f9b34fb', '000018f0-0000-1000-8000-00805f9b34fb'] 
            });

            statusBox.innerText = "A conectar ao servidor da impressora...";
            const gattServer = await dispositivoBt.gatt.connect();
            
            statusBox.innerText = "A mapear canais de texto (Services)...";
            const services = await gattServer.getPrimaryServices();
            
            // Procura a característica que aceita escrita de dados de texto (WRITE)
            for (let service of services) {
                let characteristics = await service.getCharacteristics();
                for (let char of characteristics) {
                    if (char.properties.write || char.properties.writeWithoutResponse) {
                        caracteristicaEscrita = char; // Encontrou o canal correto de impressão!
                        break;
                    }
                }
                if (caracteristicaEscrita) break;
            }

            if(caracteristicaEscrita) {
                statusBox.innerHTML = `🟢 Conectado com Sucesso a: <b>${dispositivoBt.name}</b>`;
            } else {
                statusBox.innerText = "⚠️ Conectou, mas não encontrou o canal de escrita ESC/POS.";
            }
        } catch (e) {
            console.error(e);
            statusBox.innerText = "❌ Falha na conexão. Ative o Bluetooth.";
        }
    }

    function finalizarEImprimir() {
        if(carrinho.length === 0) return alert("Adicione apostas primeiro.");
        const reciboId = "MZ-" + Math.random().toString(36).substr(2, 6).toUpperCase();
        const total = carrinho.reduce((a,b) => a + b.valor, 0);

        // Salvar em banco local para auditoria antifraude
        let todosBilhetes = JSON.parse(localStorage.getItem('sistema_lotto_db')) || [];
        todosBilhetes.push({ id: reciboId, apostas: carrinho, total: total, pago: false });
        localStorage.setItem('sistema_lotto_db', JSON.stringify(todosBilhetes));

        // Construir Texto do modelo P.O.S Termico
        let txt = `     MOZLOTTOGANHA\n--------------------------------\nBILHETE: ${reciboId}\n--------------------------------\n`;
        carrinho.forEach((c, idx) => {
            txt += `${idx+1}. Sorteio: ${c.nome}\n   Chance ${c.chance}: ${c.numeros.join('-')}\n   Valor: ${c.valor} MTN\n`;
        });
        txt += `--------------------------------\nTOTAL: ${total} MTN\n\n   Boa Sorte Moçambique\n\n\n\n`;

        // Transmitir Texto Puro para os rolos da Impressora via Bluetooth
        if (caracteristicaEscrita) {
            let encoder = new TextEncoder();
            caracteristicaEscrita.writeValue(encoder.encode(txt))
                .then(() => alert("Imprimindo bilhete na máquina física..."))
                .catch(err => alert("Erro ao empurrar bytes para o rolo: " + err));
        } else {
            alert(`Bilhete gerado com ID ${reciboId}, mas nenhuma impressora física está ativa.`);
        }

        carrinho = [];
        document.getElementById('lista-carrinho').innerText = "Nenhuma aposta adicionada.";
        document.getElementById('total-bilhete').innerText = 0;
    }

    // ==========================================
    // ALGORITMO DO SORTEIO INTELIGENTE (RETORNO DE 40% MAX)
    // ==========================================
    function executarSorteioInteligente() {
        let drawId = document.getElementById('draw-sorteio-select').value;
        let todosBilhetes = JSON.parse(localStorage.getItem('sistema_lotto_db')) || [];
        
        // 1. Filtrar todas as apostas feitas especificamente para este sorteio
        let apostasDoSorteio = [];
        todosBilhetes.forEach(b => {
            b.apostas.forEach(ap => {
                if(ap.sorteioId == drawId) apostasDoSorteio.push(ap);
            });
        });

        // 2. Calcular Arrecadação Total do Sorteio e definir o teto de 40% para prêmios
        let faturamentoSorteio = apostasDoSorteio.reduce((sum, item) => sum + item.valor, 0);
        let tetoPremios = faturamentoSorteio * 0.40;

        let bolasVencedoras = [];
        let menorPrejuizoPremios = Infinity;
        let melhorCombinacaoBolas = [];

        // 3. Simulação de Risco (Roda 50 testes de combinações aleatórias)
        for (let t = 0; t < 50; t++) {
            let combinacaoTeste = [];
            while(combinacaoTeste.length < 5) {
                let n = Math.floor(Math.random() * 90) + 1;
                if(!combinacaoTeste.includes(n)) combinacaoTeste.push(n);
            }

            // Calcula quanto a banca teria de pagar caso essa combinação fosse sorteada
            let totalPremiosSimulado = 0;
            apostasDoSorteio.forEach(ap => {
                // Conta quantos acertos o jogador teve nesta simulação
                let acertos = ap.numeros.filter(n => combinacaoTeste.includes(n)).length;
                
                // Tabela de prêmios fixos baseada nas regras de negócio informadas
                if (ap.chance == 5) {
                    if(acertos == 5) totalPremiosSimulado += 500000;
                    if(acertos == 4) totalPremiosSimulado += 15000;
                    if(acertos == 3) totalPremiosSimulado += 500;
                    if(acertos == 2) totalPremiosSimulado += 50;
                    if(acertos == 1) totalPremiosSimulado += 5;
                } else if (ap.chance == 4) {
                    if(acertos == 4) totalPremiosSimulado += 10000;
                    if(acertos == 3) totalPremiosSimulado += 500;
                    if(acertos == 2) totalPremiosSimulado += 100;
                    if(acertos == 1) totalPremiosSimulado += 10;
                } else if (ap.chance == 3) {
                    if(acertos == 3) totalPremiosSimulado += 5000;
                    if(acertos == 2) totalPremiosSimulado += 50;
                    if(acertos == 1) totalPremiosSimulado += 5;
                } else if (ap.chance == 2) {
                    if(acertos == 2) totalPremiosSimulado += 250;
                    if(acertos == 1) totalPremiosSimulado += 25;
                }
            });

            // Se o prêmio simulado respeita a margem de segurança de 40%, guardamos imediatamente
            if (totalPremiosSimulado <= tetoPremios) {
                melhorCombinacaoBolas = combinacaoTeste;
                menorPrejuizoPremios = totalPremiosSimulado;
                break; // Encontrou um sorteio matematicamente seguro para a banca!
            }

            // Caso todas passem do teto, rastreia a que causa o menor impacto financeiro
            if (totalPremiosSimulado < menorPrejuizoPremios) {
                menorPrejuizoPremios = totalPremiosSimulado;
                melhorCombinacaoBolas = combinacaoTeste;
            }
        }

        // Se não houver apostas feitas, usa a última combinação aleatória gerada
        if(melhorCombinacaoBolas.length === 0) {
            while(melhorCombinacaoBolas.length < 5) {
                let n = Math.floor(Math.random() * 90) + 1;
                if(!melhorCombinacaoBolas.includes(n)) melhorCombinacaoBolas.push(n);
            }
            menorPrejuizoPremios = 0;
        }

        // Exibir resultado calculado na tela
        document.getElementById('resultado-sorteio').innerHTML = `
            🎰 Sorteio Apurado!<br>
            Bolas Vencedoras: <span style="color:green; font-size:16px;">[${melhorCombinacaoBolas.sort((a,b)=>a-b).join(' - ')}]</span><br>
            Faturamento Total: ${faturamentoSorteio} MTN<br>
            Total Pago em Prêmios: ${menorPrejuizoPremios} MTN (~${faturamentoSorteio > 0 ? ((menorPrejuizoPremios/faturamentoSorteio)*100).toFixed(1) : 0}%)
        `;
    }
</script>
</body>
</html>
