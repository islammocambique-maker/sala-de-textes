<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOZLOTTOGANHA - Sistema de Lotaria & P.O.S</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* ============================================
           ESTILOS GERAIS DA INTERFACE (Tema Escuro)
           ============================================ */
        :root {
            --bg-primary: #0f0f1a;
            --bg-card: #16162a;
            --accent: #00ff88;
            --accent-urgent: #ff4a4a;
            --text: #ffffff;
            --text-muted: #8b8baf;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--accent);
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        header p {
            color: var(--text-muted);
            margin: 5px 0 0 0;
        }

        h2 {
            border-left: 4px solid var(--accent);
            padding-left: 10px;
            font-size: 1.4rem;
            margin-top: 30px;
        }

        /* Grid de Sorteios */
        .sorteos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .sorteio-card {
            background: var(--bg-card);
            border: 1px solid #252545;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .sorteio-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.1);
        }

        .sorteio-card.active {
            border-color: var(--accent);
            background: #1a2636;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .sorteio-card.closed {
            opacity: 0.6;
            border-color: #ff4a4a;
        }

        .sorteio-card.winner {
            border-color: #f4c430;
            background: #242015;
        }

        .sorteio-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .sorteio-name {
            font-weight: bold;
            font-size: 0.95rem;
        }

        .sorteio-time {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .sorteio-status {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .status-open { background: rgba(0, 255, 136, 0.2); color: var(--accent); }
        .status-closed { background: rgba(255, 74, 74, 0.2); color: var(--accent-urgent); }
        .status-next { background: rgba(244, 196, 48, 0.2); color: #f4c430; }

        .sorteio-balls {
            display: flex;
            gap: 5px;
            margin: 10px 0;
            min-height: 30px;
            align-items: center;
        }

        .ball {
            width: 28px;
            height: 28px;
            background: #f4c430;
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
            animation: popIn 0.3s ease forwards;
        }

        .ball-placeholder {
            width: 26px;
            height: 26px;
            border: 1px dashed #3d3d66;
            border-radius: 50%;
        }

        .countdown {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
        }

        .countdown.urgent {
            color: var(--accent-urgent);
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        /* Seletor de Chance */
        .chance-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .chance-btn {
            flex: 1;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid #252545;
            color: var(--text);
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chance-btn.selected {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        /* Grelha Numérica (90 Números) */
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 6px;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #252545;
        }

        @media (max-width: 600px) {
            .numbers-grid { grid-template-columns: repeat(5, 1fr); }
        }

        .num-btn {
            aspect-ratio: 1;
            background: #1f1f3a;
            border: 1px solid #2f2f54;
            color: var(--text);
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 1rem;
        }

        .num-btn:hover:not(.disabled) {
            border-color: var(--accent);
            background: #2a2a4e;
        }

        .num-btn.selected {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .num-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Painel de Controlo da Aposta */
        .bet-control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #16162a;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #252545;
        }

        .selected-balls-display {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .selected-ball {
            width: 32px;
            height: 32px;
            background: var(--accent);
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .action-btns button {
            padding: 12px 24px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            margin-left: 10px;
        }

        #btnApostar {
            background: var(--accent);
            color: #000;
        }

        #btnApostar:disabled {
            background: #3d3d5c;
            color: #8b8baf;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #ff4a4a;
            color: white;
        }

        /* Verificador de Bilhetes */
        .verifier-box {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #252545;
            margin-top: 20px;
        }

        .verifier-input-group {
            display: flex;
            gap: 10px;
        }

        .verifier-input-group input {
            flex: 1;
            padding: 12px;
            background: #1f1f3a;
            border: 1px solid #2f2f54;
            color: white;
            border-radius: 6px;
            font-size: 1rem;
            text-transform: uppercase;
        }

        .verifier-input-group button {
            padding: 12px 24px;
            background: #4a4aff;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        #verificarResult {
            margin-top: 15px;
        }

        /* Modais */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1f1f3a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #3d3d66;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 15px;
        }

        .modal-actions button {
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-blue { background: #00a2ff; color: #fff; }
        .btn-green { background: #00ff88; color: #000; }
        .btn-close { background: #3d3d5c; color: #fff; }

        /* ============================================
           ESTILOS DO RECIBO DENTRO DO MODAL (TELA)
           ============================================ */
        .pos-recibo {
            width: 280px;
            background: #fff;
            color: #000;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.3;
            margin: 0 auto;
            border: 1px dashed #777;
        }

        .pos-header { text-align: center; }
        .pos-header h3 { font-size: 16px; margin: 0 0 4px 0; font-weight: bold; }
        .pos-header .sub { font-size: 10px; margin: 2px 0; font-weight: bold; }
        .pos-divider { text-align: center; margin: 5px 0; font-weight: bold; }
        .pos-section-title { text-align: center; font-size: 10px; font-weight: bold; margin: 6px 0; text-decoration: underline; }
        .pos-line { display: flex; justify-content: space-between; padding: 2px 0; }
        .pos-line.center { justify-content: center; }
        .pos-line.bold { font-weight: bold; font-size: 14px; }
        .pos-line.big { font-size: 15px; font-weight: bold; }
        .pos-balls-row { display: flex; gap: 5px; justify-content: center; margin: 8px 0; }
        .pos-ball { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #000; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; background: #fff; }
        .pos-valor-box { border: 2px solid #000; padding: 6px; text-align: center; margin: 8px 0; }
        .pos-valor-box .label { font-size: 10px; font-weight: bold; }
        .pos-valor-box .valor { font-size: 18px; font-weight: bold; }
        .pos-barcode-area { text-align: center; margin: 8px 0; }
        .pos-barcode-lines { font-size: 14px; letter-spacing: 1px; white-space: nowrap; overflow: hidden; }
        .pos-barcode { font-size: 9px; font-weight: bold; }
        .pos-footer { text-align: center; font-size: 9px; margin-top: 8px; }
        .pos-footer p { margin: 2px 0; }

        /* Animações */
        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="particles"></div>

    <div class="container">
        <header>
            <h1>MOZLOTTOGANHA</h1>
            <p>Painel Operacional de Vendas & Emissão P.O.S</p>
        </header>

        <h2>1. Selecione o Sorteio Ativo</h2>
        <div id="sorteosGrid" class="sorteos-grid">
            </div>

        <h2>2. Configurar Bilhete</h2>
        <div class="chance-container">
            <button class="chance-btn selected" data-chance="5" onclick="selectChance(5)">CHANCE 5</button>
            <button class="chance-btn" data-chance="4" onclick="selectChance(4)">CHANCE 4</button>
            <button class="chance-btn" data-chance="3" onclick="selectChance(3)">CHANCE 3</button>
            <button class="chance-btn" data-chance="2" onclick="selectChance(2)">CHANCE 2</button>
        </div>

        <div id="numbersGrid" class="numbers-grid">
            </div>

        <div class="bet-control-panel">
            <div>
                <span style="color: var(--text-muted); font-size: 0.9rem;">Selecionados (<span id="selectedCount">0</span>/<span id="maxSelect">5</span>):</span>
                <div id="selectedBalls" class="selected-balls-display" style="margin-top: 5px;">
                    </div>
            </div>
            <div>
                <span style="color: var(--text-muted); font-size: 0.9rem; display: block; text-align: right;">Sorteio Alvo: <strong id="sorteioNome" style="color:#fff;">Nenhum</strong> (<span id="sorteioHora">--:--</span>)</span>
                <div class="action-btns" style="margin-top: 5px;">
                    <button class="btn-clear" onclick="clearSelection()">Limpar</button>
                    <button id="btnApostar" disabled onclick="fazerAposta()">REGISTAR APOSTA</button>
                </div>
            </div>
        </div>

        <h2>3. Validar e Pagar Prémios</h2>
        <div class="verifier-box">
            <div class="verifier-input-group">
                <input type="text" id="verificarInput" placeholder="Insira o ID do Recibo (Ex: MLG...)">
                <button onclick="verificarRecibo()">Verificar Estado</button>
            </div>
            <div id="verificarResult">
                </div>
        </div>
    </div>

    <div id="modalRecibo" class="modal">
        <div class="modal-content">
            <div id="reciboContent">
                </div>
            <div class="modal-actions">
                <button class="btn-green" onclick="printBluetooth()">IMPRIMIR IMPRESSORA BLUETOOTH</button>
                <button class="btn-blue" onclick="printScreen()">IMPRIMIR VIA NAVEGADOR (P.O.S)</button>
                <button class="btn-close" onclick="closeModal()">CONCLUIR / FECHAR</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
